<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P3TO ARCHIVE</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/711/711769.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --accent: #ff8c00;
            --bg: #020617;
            --card: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --card: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background 0.4s ease, color 0.4s ease; 
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: var(--bg);
            color: var(--text);
            touch-action: manipulation;
        }

        /* --- ANIMATIONS --- */
        @keyframes floatLogin { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-15px); } 
        }
        @keyframes popIn { 
            0% { opacity: 0; transform: translateY(30px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .bg-animate { position: fixed; inset: 0; z-index: -2; background: linear-gradient(45deg, #020617, #0f172a, #020617); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; }
        .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -10%; left: -10%; }

        /* --- LOGIN SECTION --- */
        #login-section { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-glass { 
            background: var(--card); 
            backdrop-filter: blur(30px); 
            border: 1px solid var(--glass-border); 
            padding: 40px; 
            border-radius: 40px; 
            width: min(400px, 100%); 
            text-align: center; 
            animation: floatLogin 5s ease-in-out infinite; 
        }

        /* FIX: Font 16px agar tidak auto-zoom di HP */
        .login-input { 
            width: 100%; padding: 16px; background: rgba(0,0,0,0.2); 
            border: 1px solid var(--glass-border); border-radius: 15px; 
            color: var(--text); text-align: center; margin: 20px 0; 
            outline: none; font-size: 16px !important; 
        }

        .btn-neon { 
            background: var(--accent); color: white; border: none; padding: 14px 28px; 
            border-radius: 20px; font-weight: 800; cursor: pointer; transition: all 0.3s;
        }
        .btn-neon:hover { transform: scale(1.05); box-shadow: 0 10px 20px var(--accent); }

        /* --- DASHBOARD --- */
        #main-dashboard { display: none; padding: 20px 5%; max-width: 1400px; margin: 0 auto; animation: popIn 0.8s ease-out; }
        
        /* FIX: Navigasi agar tidak menimpa konten */
        .nav-glass { 
            background: var(--card); backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); padding: 20px; 
            border-radius: 25px; display: flex; justify-content: space-between; 
            align-items: center; margin-bottom: 30px; position: relative; z-index: 100;
        }

        .gallery { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; padding-bottom: 120px; 
        }

        .card { 
            background: var(--card); border-radius: 25px; padding: 15px; 
            border: 1px solid var(--glass-border); transition: 0.4s;
        }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 18px; }

        /* --- SETTINGS DRAWER --- */
        .settings-drawer { 
            position: fixed; right: -100%; top: 0; width: 300px; height: 100%; 
            background: var(--bg); border-left: 1px solid var(--glass-border); 
            z-index: 2001; padding: 40px 20px; transition: 0.5s; 
        }
        .settings-drawer.active { right: 0; }

        /* --- FLOATING HUB --- */
        .floating-hub { position: fixed; right: 25px; bottom: 25px; display: flex; gap: 12px; z-index: 1000; }
        .float-btn { 
            width: 55px; height: 55px; border-radius: 18px; background: var(--card); 
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border); 
            color: var(--text); display: flex; align-items: center; justify-content: center; 
            font-size: 1.3rem; cursor: pointer; 
        }

        /* --- RESPONSIVE MOBILE FIX --- */
        @media (max-width: 768px) {
            .nav-glass { flex-direction: column; gap: 15px; text-align: center; }
            .nav-glass div:last-child { display: flex; width: 100%; gap: 10px; }
            .nav-glass button { flex: 1; font-size: 0.8rem; padding: 10px; }
            .gallery { grid-template-columns: 1fr; }
            .floating-hub { left: 50%; right: auto; transform: translateX(-50%); width: fit-content; bottom: 20px; }
            .login-glass { width: 90%; }
        }

        #tutorialModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg); padding: 30px; border-radius: 30px; border: 1px solid var(--glass-border); max-width: 400px; }
    </style>
</head>
<body data-theme="dark">

    <div class="bg-animate"></div>
    <div class="orb orb-1"></div>

    <div class="settings-drawer" id="settingsDrawer">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="font-weight: 800;">SETTINGS</h2>
            <i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="toggleSettings()"></i>
        </div>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px;">GANTI TEMA</p>
        <button class="btn-neon" style="width:100%; margin-bottom: 20px;" onclick="handleThemeSwitch()">SWITCH THEME</button>
    </div>

    <div class="floating-hub">
        <a href="https://discord.com/invite/aarURee5bH" target="_blank" class="float-btn"><i class="fa-brands fa-discord"></i></a>
        <button class="float-btn" onclick="toggleSettings()"><i class="fa-solid fa-gear"></i></button>
    </div>

    <section id="login-section">
        <div class="login-glass">
            <h1 style="font-size: 2.5rem; font-weight: 900;">P3TO<span style="color:var(--accent);">.</span></h1>
            <input type="password" id="idInput" class="login-input" placeholder="ENTER PASSKEY">
            <button class="btn-neon" style="width: 100%;" onclick="handleLogin()">LOGIN</button>
        </div>
    </section>

    <main id="main-dashboard">
        <nav class="nav-glass">
            <div id="greeting" style="font-weight: 800;"></div>
            <div style="display:flex; gap:10px;">
                <button id="tutorialBtn" class="btn-neon" style="background:rgba(255,255,255,0.05); display:none;" onclick="toggleTutorial()">PANDUAN</button>
                <button class="btn-neon" style="background:#ef4444;" onclick="location.reload()">LOGOUT</button>
            </div>
        </nav>

        <div id="uploadBox" style="display:none; background:var(--card); padding:15px; border-radius:20px; border: 1px solid var(--glass-border); margin-bottom:20px; display:flex; gap:10px;">
            <input type="text" id="imgUrl" class="login-input" style="margin:0; text-align:left; background:transparent; border:none;" placeholder="Link Gambar HD...">
            <button class="btn-neon" id="uploadBtn">UNGGAH</button>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <button class="btn-neon" style="background: transparent; border: 1px solid var(--glass-border);" onclick="downloadAllZip()" id="zipBtn">
                <i class="fa-solid fa-box-archive"></i> DOWNLOAD SEMUA (.ZIP)
            </button>
        </div>

        <div class="gallery" id="gallery"></div>
    </main>

    <div id="tutorialModal" onclick="toggleTutorial()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:15px;">Cara Upload</h3>
            <p style="font-size: 0.9rem; line-height: 1.6; opacity: 0.8;">
                1. Upload foto ke Postimages.<br>
                2. Ambil "Direct Link" (akhiran .jpg/.png).<br>
                3. Paste di kotak unggah dashboard ini.
            </p>
            <button class="btn-neon" style="width:100%; margin-top:20px;" onclick="toggleTutorial()">OKE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCA14Xq6CKyiiqnVK16N_fOVl-njWewPLE",
            authDomain: "p3to-ecosystem.firebaseapp.com",
            projectId: "p3to-ecosystem",
            storageBucket: "p3to-ecosystem.firebasestorage.app",
            messagingSenderId: "49693011075",
            appId: "1:49693011075:web:aeedbfeef4dc979f7a7fb6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const USERS = {
            "Mizael2784": { name: "Mixo", role: "DEV", msg: "Halo Tuan Muda Mixo" },
            "PEGASUS_GOAT": { name: "PEGASUS", role: "ADMIN", msg: "Halo Abdan Brebes" },
            "SENJU33": { name: "Senju", role: "ADMIN", msg: "Halo Tuan Senju" },
            "BersamaP3TO": { name: "Sahabat", role: "MEMBER", msg: "Halo Sahabat P3TO" }
        };

        let activeUser = null;

        window.toggleSettings = () => document.getElementById('settingsDrawer').classList.toggle('active');
        window.toggleTutorial = () => { const m = document.getElementById('tutorialModal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
        window.handleThemeSwitch = () => {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        };

        window.handleLogin = () => {
            const key = document.getElementById('idInput').value;
            if(USERS[key]) {
                activeUser = USERS[key];
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                document.getElementById('greeting').innerText = activeUser.msg;
                
                if(activeUser.role !== 'MEMBER') {
                    document.getElementById('uploadBox').style.display = 'flex';
                    document.getElementById('tutorialBtn').style.display = 'block';
                }
                loadGallery();
            } else { alert("Passkey Salah!"); }
        };

        function loadGallery() {
            const q = query(collection(db, "photos"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const gallery = document.getElementById('gallery'); gallery.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const card = document.createElement('div');
                    card.className = 'card animate__animated animate__fadeInUp';
                    card.innerHTML = `
                        <img src="${data.imageUrl}" alt="P3TO">
                        <div style="margin-top:12px;">
                            <p style="font-size:0.7rem; color:var(--accent); font-weight:800;">${data.uploader || 'SYSTEM'}</p>
                            <div style="display:flex; gap:8px; margin-top:10px;">
                                <button class="btn-neon" style="flex:1; padding:8px; font-size:0.7rem; background:#10b981;" onclick="window.downloadImg('${data.imageUrl}')">DOWNLOAD</button>
                                ${activeUser.role === 'DEV' ? `<button onclick="window.delImg('${d.id}')" style="background:rgba(239,68,68,0.1); border:none; color:#ef4444; width:35px; border-radius:10px; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            });
        }

        document.getElementById('uploadBtn').onclick = async () => {
            const url = document.getElementById('imgUrl').value;
            if(!url.includes('http')) return alert("Link tidak valid!");
            await addDoc(collection(db, "photos"), { imageUrl: url, uploader: activeUser.name, createdAt: serverTimestamp() });
            document.getElementById('imgUrl').value = "";
        };

        window.downloadImg = async (url) => {
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                saveAs(blob, "P3TO-" + Date.now() + ".jpg");
            } catch (e) { window.open(url, '_blank'); }
        };

        window.delImg = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, "photos", id)); };

        window.downloadAllZip = async () => {
            const zip = new JSZip(); const btn = document.getElementById('zipBtn');
            const imgs = document.querySelectorAll('.card img');
            if(imgs.length === 0) return alert("Kosong!");
            btn.innerText = "PROSES...";
            for(let i=0; i<imgs.length; i++) {
                try {
                    const res = await fetch(imgs[i].src);
                    const blob = await res.blob();
                    zip.file(`asset-${i+1}.jpg`, blob);
                } catch(e) {}
            }
            zip.generateAsync({type:"blob"}).then(b => {
                saveAs(b, "P3TO-ALL.zip");
                btn.innerHTML = '<i class="fa-solid fa-box-archive"></i> DOWNLOAD SEMUA (.ZIP)';
            });
        };
    </script>
</body>
</html>
